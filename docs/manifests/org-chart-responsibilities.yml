# Structured form of docs/manifests/org-chart-responsibilities.md
# Consumed by dacumen/scripts/render-responsibilities.sh (Phase 3b of the
# originating plan). Sanitized form (role-labels, no proper nouns / IPs /
# hostnames). When a renderer needs the actual agent identifiers + paths
# for THIS install, it merges this sidecar with a private mapping file
# (e.g., `<repo>/.foreman/agent-identity-map.yml`) that is NOT externalized.
#
# Companion doc: org-chart-responsibilities.md (human-readable canonical).

schema_version: 2          # bumped from 1 for v0.2.0 — adds `kind` discriminator + new agent kinds
manifest_version: v0.2.0   # bumped from v0.1.0 (see v0_2_extension block below)
ratification_cycle: della-cycle-2
ratification_loop: L00-sidebar
ratification_date: 2026-05-10

# v0.2.0 extension — generalized the schema beyond org-roles to cover all
# 11 agent kinds discovered during the agent-card-research pass. Backward
# compatible per P3 bilateral leniency (v0.1.0 readers ignore unknown fields;
# v0.2.0 readers default missing `kind` to `business_role`).
v0_2_extension:
  ratification_cycle: gov-10
  ratification_loop: post-close-addendum-7-followup
  ratification_date: 2026-05-16
  scope: extend with kind discriminator + universal fields + new agent tiers (subagent, skill — 4 exemplars in phase-3a; bulk authoring of remaining ~18 in phase-3b)
  references:
    - governance-thread/docs/agent-card-research/01-field-inventory.md
    - governance-thread/docs/agent-card-research/02-schema-design.md
    - governance-thread/docs/agent-card-research/03-impact-analysis.md

# Valid kind enum values (discriminator for v0.2.0+ cards). Cards missing `kind`
# default to `business_role` at render time per the bilateral-leniency policy.
kinds:
  - business_role     # existing 7 entries default here
  - subagent          # Claude Code subagents (Plan/Explore/general-purpose/etc)
  - skill             # User-invocable skills (/brief, /loop, /schedule, etc)
  - mcp_tool          # MCP-provided tools (reference-only per P2 — points at upstream MCP server schema)
  - nephew            # Cascade thread agents (Huey/Louie/Dewey)
  - service           # Services-as-agents (casey-junior, ellabot, lorna, darnbot, etc)
  - pipeline          # casey-junior pipelines (laundry-room, doc-health, etc)
  - timer             # User-systemd timers
  - routine           # Scheduled remote routines (/schedule cron agents)
  - hook              # settings.json hooks (SessionStart, SessionEnd, etc)
  - project_endpoint  # casey-junior PROJECT_ENDPOINTS registry entries

