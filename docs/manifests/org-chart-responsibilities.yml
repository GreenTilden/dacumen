    kind: skill
    role_label: frontend-design — Create Distinctive Production-Grade Frontends
    invocation_pattern: /frontend-design (plugin-namespaced as frontend-design:frontend-design)
    description: |
      Create distinctive, production-grade frontend interfaces with high design
      quality. Use when the user asks to build web components, pages, or
      applications. Generates creative, polished code that avoids generic AI
      aesthetics.
    scope_excluded: |
      Not for backend work. Not for accessibility audit alone (treats a11y as
      part of polish, not the sole focus). Not for design-system theming
      changes — this generates net-new design, not theme modifications.
    reports_to: operator
    inputs: A description of the UI / page / component to build
    outputs: Frontend code (HTML / CSS / JS / Vue / React) with distinctive design choices + polish
    tools_allow_list:
      - Read
      - Write
      - Edit
      - Bash
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/plugins/frontend-design/ (plugin-namespaced)

