    role_label: /init — Initialize New CLAUDE.md
    invocation_pattern: /init in a fresh repo
    description: |
      Initialize a new CLAUDE.md file with codebase documentation. Use when
      bootstrapping a new repo to give future Claude sessions immediate
      context on what the project is, architecture, and conventions.
    scope_excluded: |
      Not for updating an existing CLAUDE.md (just edit directly). Not for
      memory authoring. Not for skill or agent authoring — strictly CLAUDE.md
      bootstrap for a new repo.
    reports_to: operator
    inputs: None (reads the cwd repo)
