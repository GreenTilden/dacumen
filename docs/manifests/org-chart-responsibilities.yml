  # ============================================================
  # subagent kind — Claude Code subagents (4 exemplars in phase-3a)
  # Bulk-author remaining ~2 in phase-3b: general-purpose, claude-code-guide,
  # statusline-setup, frontend-design.
  # ============================================================

  - id: subagent_explore
    kind: subagent
    role_label: Explore — Fast Read-Only Search
    invocation_pattern: Agent tool with subagent_type=Explore
    description: |
      Fast read-only search agent for locating code. Use it to find files by
      pattern (e.g. "src/components/**/*.tsx"), grep for symbols or keywords
      (e.g. "API endpoints"), or answer "where is X defined / which files
      reference Y." Specify search breadth at invocation: "quick" / "medium" /
      "very thorough".
    scope_excluded: |
      Not for code review, design-doc auditing, cross-file consistency checks,
      or open-ended analysis — Explore reads excerpts rather than whole files
      and will miss content past its read window. For those use Plan or
      general-purpose subagents instead.
    reports_to: operator
    inputs: A search prompt + an explicit breadth hint (quick/medium/very thorough)
    outputs: Concise report of where the searched-for entity lives, with file paths + line numbers
    tools_allow_list:
      - All tools except Agent, ExitPlanMode, Edit, Write, NotebookEdit
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  - id: subagent_plan
    kind: subagent
    role_label: Plan — Implementation Architect
    invocation_pattern: Agent tool with subagent_type=Plan
    description: |
      Software architect agent for designing implementation plans. Use this
      when you need to plan the implementation strategy for a task. Returns
      step-by-step plans, identifies critical files, and considers architectural
      trade-offs.
    scope_excluded: |
      Not for code writing (no Edit/Write access). Not for execution. Not for
      open-ended research (use general-purpose). Not for code search (use
      Explore — Plan is for synthesis once relevant code is identified, not for
      locating code).
    reports_to: operator
    inputs: A task description + relevant codebase context (file paths, prior research)
    outputs: Step-by-step implementation plan with critical files + architectural tradeoff analysis
    tools_allow_list:
      - All tools except Agent, ExitPlanMode, Edit, Write, NotebookEdit
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  # ============================================================
  # skill kind — User-invocable skills (2 exemplars in phase-3a)
  # Bulk-author remaining ~14 in phase-3b: pre-brief, batch-brief, intent,
  # recall, tock, /schedule, /update-config, /init, /review, /security-review,
  # /simplify, /fewer-permission-prompts, /claude-api, /keybindings-help.
  # ============================================================

  - id: skill_brief
    kind: skill
    role_label: /brief — Session Briefing
    invocation_pattern: /brief in chat (or auto-fires on SessionStart hook)
    description: |
      Pulls cycle/sprint/loop state from .foreman + observatory + EllaBot
      ledger. Read-only session briefing — emits a structured /brief block
      showing current cycle status, latest sprint loop, EllaBot ledger tail,
      proposed next action.
    scope_excluded: |
      Does not modify state — purely a read pass. Does not poll continuously
      (use /loop for that). Does not author plans (use /pre-brief for
      incoming-nephew readiness checks or /batch-brief for batch readiness).
      Does not execute work — emits state, operator picks next action.
    reports_to: operator
    inputs: None (reads from local .foreman + remote casey-junior + ellabot endpoints)
    outputs: Markdown /brief block rendered into chat with cycle header + sprint state + ledger tail + proposed_next_action
    dependencies:
      - service_casey_junior
      - service_ellabot
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/brief/brief.sh

  - id: skill_loop
    kind: skill
    role_label: /loop — Recurring Task Runner
    invocation_pattern: /loop <interval> <skill-or-prompt> (e.g. /loop 5m /brief)
    description: |
      Runs a prompt or slash command on a recurring interval. Omit the interval
      to let the model self-pace ("dynamic mode"). Use for recurring tasks,
      polling for status, or watching a condition. The harness fires the loop
      iterations on schedule and tracks until /loop stop or model decides to end.
    scope_excluded: |
      Not for one-off tasks. Not for scheduling REMOTE recurring agents (that
      is /schedule). Not for sleeping in the middle of other work (use Bash
      with run_in_background instead). The dynamic mode (no interval) is for
      when the model itself paces — not for fire-and-forget polling.
    reports_to: operator
    inputs: An interval (e.g. "5m") OR dynamic mode + a prompt/slash-command to run each tick
    outputs: Per-tick execution of the supplied prompt; loop continues until model exits or user stops
    schedule: dynamic (per-tick scheduled via ScheduleWakeup) OR fixed-interval (cron-style)
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/loop/ (runtime-registered via plugin)

  # ============================================================
  # Phase 3b — bulk authoring (2026-05-16)
  # Remaining 4 subagents + 12 harness-listed skills + 3 local-only skills.
  # Drafted from system-prompt subagent descriptions + skill .sh script
  # headers + harness's available-skills runtime registry.
  # ============================================================

  - id: subagent_general_purpose
    kind: subagent
    role_label: general-purpose — Multi-Step Researcher + Executor
    invocation_pattern: Agent tool with subagent_type=general-purpose
    description: |
      General-purpose agent for researching complex questions, searching for
      code, and executing multi-step tasks. Use when searching for a keyword
      or file and not confident the first few tries will hit, or for any
      open-ended workflow that doesn't match a more specialized subagent.
    scope_excluded: |
      Not for read-only quick lookups (Explore is faster + lighter). Not for
      pure plan authorship (use Plan). Not for trivial single-step tasks
      better handled inline. Has full tool access — use the narrower subagent
      kinds when their scope matches to keep context tight.
    reports_to: operator
    inputs: A task description + optional context; can be open-ended
    outputs: A concise report of work performed + findings; may include file edits if the task warranted them
    tools_allow_list:
      - "*"
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  - id: subagent_claude_code_guide
    kind: subagent
    role_label: claude-code-guide — Claude Code/SDK/API Q&A
    invocation_pattern: Agent tool with subagent_type=claude-code-guide
    description: |
      Use when the user asks "Can Claude...", "Does Claude...", "How do I..."
      questions about Claude Code (CLI), Claude Agent SDK (building custom
      agents), or Claude API (Anthropic SDK usage, tool use, model versions).
      Check for already-running instances and continue via SendMessage before
      spawning a new one.
    scope_excluded: |
      Not for general programming questions (use general-purpose). Not for
      code search (use Explore). Not for active implementation work (use Plan
      or general-purpose). Strictly Q&A about Anthropic products.
    reports_to: operator
    inputs: A natural-language question about Claude Code / SDK / API
    outputs: Concise answer with documentation citations
    tools_allow_list:
      - Bash
      - Read
      - WebFetch
      - WebSearch
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  - id: subagent_claude
    kind: subagent
    role_label: claude — Catch-All (FleetView Default)
    invocation_pattern: Agent tool with subagent_type=claude (or FleetView default when no agent name typed)
    description: |
      Catch-all subagent for any task that doesn't fit a more specific agent.
      FleetView's default when no agent name is typed. Has full tool access.
    scope_excluded: |
      Prefer a more specific subagent when one fits — claude is the fallback,
      not the first choice. Using a specialized subagent (Explore for search,
      Plan for design, claude-code-guide for SDK Q&A) keeps context tighter
      and produces sharper outputs.
    reports_to: operator
    inputs: Any task description that doesn't match a more specific subagent
    outputs: Varies by task; same shape as the operator-level agent
    tools_allow_list:
      - "*"
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  - id: subagent_statusline_setup
    kind: subagent
    role_label: statusline-setup — Status Line Configurator
    invocation_pattern: Agent tool with subagent_type=statusline-setup
    description: |
      Configure the Claude Code status line setting. Narrow-purpose agent
      with minimal tool access (Read + Edit only).
    scope_excluded: |
      Not for general settings.json work (use /update-config). Not for any
      other configuration task — status line only.
    reports_to: operator
    inputs: A status line configuration request (theme, layout, etc.)
    outputs: Updated settings.json with status line block modified
    tools_allow_list:
      - Read
      - Edit
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  - id: skill_pre_brief
    kind: skill
    role_label: /pre-brief — Incoming Nephew Readiness Check
    invocation_pattern: /pre-brief in chat
    description: |
      Pre-fire readiness check for the INCOMING nephew — predecessor activity +
      handoff status + clear-to-fire verdict. Run before a nephew wakes to verify
      the cascade is in a clean state for the next fire.
    scope_excluded: |
      Not for general session briefing (use /brief). Not for batch readiness
      across multiple nephews (use /batch-brief). Not for active sprint work —
      this is a pre-condition check, not work itself.
    reports_to: operator
    inputs: Optional --sprint-id; defaults to detection from cwd
    outputs: Clear-to-fire | needs-attention verdict + predecessor activity summary + handoff status
    dependencies:
      - service_casey_junior
      - service_ellabot
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/pre-brief/pre-brief.sh

  - id: skill_batch_brief
    kind: skill
    role_label: /batch-brief — Incoming-Batch Readiness for Receiving Nephew
    invocation_pattern: /batch-brief in chat
    description: |
      Single-screen incoming-batch readiness for receiving nephew — handoff scan +
      pool/forward-scope + acceptance gates + charter cites + verdict. Used when
      multiple work items are queued for one nephew and they need to be evaluated
      as a batch before fire.
    scope_excluded: |
      Not for single-item readiness (use /pre-brief). Not for session-level state
      (use /brief). Not for actually doing the work — pure pre-fire evaluation.
    reports_to: operator
    inputs: Optional --receiving-nephew (huey | louie | dewey); defaults from cwd
    outputs: Batch readiness verdict + per-item gate status + charter cites + handoff scan
    dependencies:
      - service_casey_junior
      - service_ellabot
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/batch-brief/batch-brief.sh

  - id: skill_intent
    kind: skill
    role_label: /intent — EllaBot Layer-C Operator-Intent Tag
    invocation_pattern: /intent "<one-line summary>" (with optional --code / --duration / --dry-run)
    description: |
      Fires an EllaBot Layer-C operator-intent entry — the "right thing to do
      here is X" piecemeal intent / aside / planning thought that doesn't fit
