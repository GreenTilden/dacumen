      ratification_cycle: gov-10
      source_path: ~/.claude/skills/init/ (harness-managed)

  - id: skill_review
    kind: skill
    role_label: /review — Review a Pull Request
    invocation_pattern: /review <PR-number-or-URL>
    description: |
      Review a pull request — fetches the PR diff + context + linked issues
      and produces structured review feedback (correctness, design,
      testability, security).
    scope_excluded: |
      Not for code-quality passes on local working tree (use /simplify). Not
      for security-focused review (use /security-review). Strictly PR-shaped
      review with structured output.
    reports_to: operator
    inputs: A GitHub PR number or full PR URL
    outputs: Structured review with per-file comments + overall verdict; optionally posts to GitHub
    tools_allow_list:
      - Bash
      - Read
      - WebFetch
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/review/ (harness-managed)

  - id: skill_security_review
    kind: skill
    role_label: /security-review — Security Review of Pending Changes
    invocation_pattern: /security-review in chat
    description: |
      Complete a security review of the pending changes on the current branch.
      Looks for OWASP-top-10-style issues, credential handling, input
      validation, auth-perimeter assumptions.
    scope_excluded: |
      Not a substitute for a full security audit (this is per-change scope).
      Not for review of someone else's PR (use /review with security framing).
      Not for runtime/operational security (network, perimeter, secrets
      management) — focuses on code-level issues in pending changes.
    reports_to: operator
    inputs: None (analyzes pending changes on current branch)
    outputs: List of identified security concerns with severity + remediation guidance
    tools_allow_list:
      - Read
      - Bash
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/security-review/ (harness-managed)

  - id: skill_claude_api
    kind: skill
    role_label: /claude-api — Build/Debug Claude API + Anthropic SDK Apps
    invocation_pattern: /claude-api in chat (or auto-triggers on Anthropic SDK import detection)
    description: |
      Build, debug, and optimize Claude API / Anthropic SDK apps. Apps built
      with this skill should include prompt caching. Also handles migrating
      existing Claude API code between Claude model versions (e.g., 4.5 → 4.6
      → 4.7, retired-model replacements).
    scope_excluded: |
      Not for OpenAI SDK or other-provider apps (file imports `openai`/etc).
      Not for filename-based generic apps (e.g., *-openai.py / *-generic.py).
      Not for general programming/ML questions unrelated to the Anthropic SDK.
    reports_to: operator
    inputs: A Claude API / SDK code task (build new, debug, migrate model version, tune caching)
    outputs: Code edits or new files implementing the requested capability with caching defaults
    tools_allow_list:
      - Read
      - Edit
      - Write
      - Bash
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/claude-api/ (harness-managed)

