# Structured form of docs/manifests/org-chart-responsibilities.md
# Consumed by dacumen/scripts/render-responsibilities.sh (Phase 3b of the
# originating plan). Sanitized form (role-labels, no proper nouns / IPs /
# hostnames). When a renderer needs the actual agent identifiers + paths
# for THIS install, it merges this sidecar with a private mapping file
# (e.g., `<repo>/.foreman/agent-identity-map.yml`) that is NOT externalized.
#
# Companion doc: org-chart-responsibilities.md (human-readable canonical).

schema_version: 2          # bumped from 1 for v0.2.0 — adds `kind` discriminator + new agent kinds
manifest_version: v0.2.0   # bumped from v0.1.0 (see v0_2_extension block below)
ratification_cycle: della-cycle-2
ratification_loop: L00-sidebar
ratification_date: 2026-05-10

# v0.2.0 extension — generalized the schema beyond org-roles to cover all
# 11 agent kinds discovered during the agent-card-research pass. Backward
# compatible per P3 bilateral leniency (v0.1.0 readers ignore unknown fields;
# v0.2.0 readers default missing `kind` to `business_role`).
v0_2_extension:
  ratification_cycle: gov-10
  ratification_loop: post-close-addendum-7-followup
  ratification_date: 2026-05-16
  scope: extend with kind discriminator + universal fields + new agent tiers (subagent, skill — 4 exemplars in phase-3a; bulk authoring of remaining ~18 in phase-3b)
  references:
    - governance-thread/docs/agent-card-research/01-field-inventory.md
    - governance-thread/docs/agent-card-research/02-schema-design.md
    - governance-thread/docs/agent-card-research/03-impact-analysis.md

# Valid kind enum values (discriminator for v0.2.0+ cards). Cards missing `kind`
# default to `business_role` at render time per the bilateral-leniency policy.
kinds:
  - business_role     # existing 7 entries default here
  - subagent          # Claude Code subagents (Plan/Explore/general-purpose/etc)
  - skill             # User-invocable skills (/brief, /loop, /schedule, etc)
  - mcp_tool          # MCP-provided tools (reference-only per P2 — points at upstream MCP server schema)
  - nephew            # Cascade thread agents (Huey/Louie/Dewey)
  - service           # Services-as-agents (casey-junior, ellabot, lorna, darnbot, etc)
  - pipeline          # casey-junior pipelines (laundry-room, doc-health, etc)
  - timer             # User-systemd timers
  - routine           # Scheduled remote routines (/schedule cron agents)
  - hook              # settings.json hooks (SessionStart, SessionEnd, etc)
  - project_endpoint  # casey-junior PROJECT_ENDPOINTS registry entries

agents:
  # ============================================================
  # business_role kind — the original 7 entries (pre-v0.2.0)
  # ============================================================

  - id: front_office_director
    kind: business_role
    role_label: Front Office Director
    invocation_pattern: Strategic-head delegation; per-sprint role assignment
    description: |
      Public-facing business operations. Owns the public dashboard, charter
      amendment authorship for business-side topics, brand standards, and the
      §14a memory-audit fire. Primary surface for external visitors + stakeholders.
    pillar_primary: professional
    pillar_secondary: null
    reports_to: strategic_head
    stewards_surfaces:
      - public_dashboard
      - charter
      - staff_directory
      - brand_standards
    responsibilities:
      - dashboard_render
      - charter_amendment_authorship_business
      - memory_audit_fire_§14a
    provenance:
      authored_at: 2026-05-15
      ratification_cycle: della-cycle-2
      source_path: dacumen/docs/manifests/org-chart-responsibilities.md

  - id: internal_systems_director
    kind: business_role
    role_label: Internal Systems Director
    invocation_pattern: Strategic-head delegation; homelab + DellaTech infrastructure ownership
    description: |
      Homelab + DellaTech infrastructure ownership. Service deploy + maintenance,
      LXC topology decisions, backup discipline, theme system. Primary Layer A
      cross-BU artifact emitter per `feedback_land_cross_bu_artifacts.md`.
    pillar_primary: domestic
    pillar_secondary: personal
    reports_to: strategic_head
    stewards_surfaces:
      - service_estate_homelab
      - lxc_topology_homelab
      - backup_discipline
      - theme_system
    responsibilities:
      - service_deploy_maintain_homelab
      - cross_bu_artifact_authoring_layer_a_primary
      - memory_audit_first_fire_active_cycle
    provenance:
      authored_at: 2026-05-15
      ratification_cycle: della-cycle-2
      source_path: dacumen/docs/manifests/org-chart-responsibilities.md

  - id: workshop_foreman
    kind: business_role
    role_label: Workshop Foreman
    invocation_pattern: Strategic-head delegation; vertical-IP system ownership
    description: |
      Vertical-IP system intelligence. Owns RAG pattern intelligence + safety
      validation for the vertical-IP corpus. Surface for prosecution-grade
      retrieval quality.
    pillar_primary: professional
    pillar_secondary: null
    reports_to: strategic_head
    stewards_surfaces:
      - vertical_ip_system
    responsibilities:
      - rag_pattern_intelligence_safety_validation
    provenance:
      authored_at: 2026-05-15
      ratification_cycle: della-cycle-2
      source_path: dacumen/docs/manifests/org-chart-responsibilities.md

  - id: strategic_head
    kind: business_role
    role_label: Strategic Head
    invocation_pattern: Operator escalation for cross-BU decisions; charter ratification fire
    description: |
      Cross-BU strategic decision authority. Ratifies charters, prioritizes the
      portfolio across all three pillars, enforces the three-pillars principle.
      Reports directly to operator.
    pillar_primary: all_three
    pillar_secondary: null
    reports_to: operator
    stewards_surfaces:
      - charter_ratification
      - portfolio_prioritization
    responsibilities:
      - charter_ratification_cross_bu
      - three_pillars_enforcement
    provenance:
      authored_at: 2026-05-15
      ratification_cycle: della-cycle-2
      source_path: dacumen/docs/manifests/org-chart-responsibilities.md

  - id: dev_lab
    kind: business_role
    role_label: Dev Lab (Telemetry Source)
    invocation_pattern: Continuous telemetry emission via EllaBot; no explicit invocation
    description: |
      Telemetry substrate role. EllaBot ledger backing — serves entries, owns
      the activity-code taxonomy, aggregates time buckets. Pure utility-pillar
      service to the rest of the org.
    pillar_primary: utility
    pillar_secondary: null
    reports_to: operator
    stewards_surfaces:
      - ledger_primary
      - activity_code_taxonomy
    responsibilities:
      - ledger_entries_serving
      - time_bucket_aggregations
    provenance:
      authored_at: 2026-05-15
      ratification_cycle: della-cycle-2
      source_path: dacumen/docs/manifests/org-chart-responsibilities.md

  - id: deployment_tracker
    kind: business_role
    role_label: Deployment Tracker (PM)
    invocation_pattern: Casey Junior REST API + activity webhooks; project-state delegation from Front Office
    description: |
      Per-project phase tracking + reconciliation health computation + activity
      logging. Backed by Casey Junior service. Surface for project-state queries
      across all BUs.
    pillar_primary: utility
    pillar_secondary: null
    reports_to: front_office_director
    stewards_surfaces:
      - deployment_phase_state
      - reconciliation_health
      - doc_health_snapshots
    responsibilities:
      - per_project_phase_tracking
      - reconciliation_health_computation
      - activity_logging
    provenance:
      authored_at: 2026-05-15
      ratification_cycle: della-cycle-2
      source_path: dacumen/docs/manifests/org-chart-responsibilities.md

  - id: operator
    kind: business_role
    role_label: Operator
    invocation_pattern: Direct interaction (chat sessions, HITL checkpoints, plan-mode authorship)
    description: |
      Human operator role at the top of the hierarchy. Fires cycle-open decisions,
      resolves HITL checkpoints, authors Layer C piecemeal intent updates. The
      ultimate source-of-truth for ratification decisions.
    pillar_primary: all_three_via_synthesis
    pillar_secondary: null
    reports_to: null
    stewards_surfaces:
      - decision_fire
      - plan_mode_authorship
      - hitl_resolution
    responsibilities:
      - cycle_open_mode_pick
      - hitl_resolution
      - layer_c_piecemeal_intent_updates
    provenance:
      authored_at: 2026-05-15
      ratification_cycle: della-cycle-2
      source_path: dacumen/docs/manifests/org-chart-responsibilities.md

  # ============================================================
  # subagent kind — Claude Code subagents (4 exemplars in phase-3a)
  # Bulk-author remaining ~2 in phase-3b: general-purpose, claude-code-guide,
  # statusline-setup, frontend-design.
  # ============================================================

  - id: subagent_explore
    kind: subagent
    role_label: Explore — Fast Read-Only Search
    invocation_pattern: Agent tool with subagent_type=Explore
    description: |
      Fast read-only search agent for locating code. Use it to find files by
      pattern (e.g. "src/components/**/*.tsx"), grep for symbols or keywords
      (e.g. "API endpoints"), or answer "where is X defined / which files
      reference Y." Specify search breadth at invocation: "quick" / "medium" /
      "very thorough".
    scope_excluded: |
      Not for code review, design-doc auditing, cross-file consistency checks,
      or open-ended analysis — Explore reads excerpts rather than whole files
      and will miss content past its read window. For those use Plan or
      general-purpose subagents instead.
    reports_to: operator
    inputs: A search prompt + an explicit breadth hint (quick/medium/very thorough)
    outputs: Concise report of where the searched-for entity lives, with file paths + line numbers
    tools_allow_list:
      - All tools except Agent, ExitPlanMode, Edit, Write, NotebookEdit
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  - id: subagent_plan
    kind: subagent
    role_label: Plan — Implementation Architect
    invocation_pattern: Agent tool with subagent_type=Plan
    description: |
      Software architect agent for designing implementation plans. Use this
      when you need to plan the implementation strategy for a task. Returns
      step-by-step plans, identifies critical files, and considers architectural
      trade-offs.
    scope_excluded: |
      Not for code writing (no Edit/Write access). Not for execution. Not for
      open-ended research (use general-purpose). Not for code search (use
      Explore — Plan is for synthesis once relevant code is identified, not for
      locating code).
    reports_to: operator
    inputs: A task description + relevant codebase context (file paths, prior research)
    outputs: Step-by-step implementation plan with critical files + architectural tradeoff analysis
    tools_allow_list:
      - All tools except Agent, ExitPlanMode, Edit, Write, NotebookEdit
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  # ============================================================
  # skill kind — User-invocable skills (2 exemplars in phase-3a)
  # Bulk-author remaining ~14 in phase-3b: pre-brief, batch-brief, intent,
  # recall, tock, /schedule, /update-config, /init, /review, /security-review,
  # /simplify, /fewer-permission-prompts, /claude-api, /keybindings-help.
  # ============================================================

  - id: skill_brief
    kind: skill
    role_label: /brief — Session Briefing
    invocation_pattern: /brief in chat (or auto-fires on SessionStart hook)
    description: |
      Pulls cycle/sprint/loop state from .foreman + observatory + EllaBot
      ledger. Read-only session briefing — emits a structured /brief block
      showing current cycle status, latest sprint loop, EllaBot ledger tail,
      proposed next action.
    scope_excluded: |
      Does not modify state — purely a read pass. Does not poll continuously
      (use /loop for that). Does not author plans (use /pre-brief for
      incoming-nephew readiness checks or /batch-brief for batch readiness).
      Does not execute work — emits state, operator picks next action.
    reports_to: operator
    inputs: None (reads from local .foreman + remote casey-junior + ellabot endpoints)
    outputs: Markdown /brief block rendered into chat with cycle header + sprint state + ledger tail + proposed_next_action
    dependencies:
      - service_casey_junior
      - service_ellabot
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/brief/brief.sh

  - id: skill_loop
    kind: skill
    role_label: /loop — Recurring Task Runner
    invocation_pattern: /loop <interval> <skill-or-prompt> (e.g. /loop 5m /brief)
    description: |
      Runs a prompt or slash command on a recurring interval. Omit the interval
      to let the model self-pace ("dynamic mode"). Use for recurring tasks,
      polling for status, or watching a condition. The harness fires the loop
      iterations on schedule and tracks until /loop stop or model decides to end.
    scope_excluded: |
      Not for one-off tasks. Not for scheduling REMOTE recurring agents (that
      is /schedule). Not for sleeping in the middle of other work (use Bash
      with run_in_background instead). The dynamic mode (no interval) is for
      when the model itself paces — not for fire-and-forget polling.
    reports_to: operator
    inputs: An interval (e.g. "5m") OR dynamic mode + a prompt/slash-command to run each tick
    outputs: Per-tick execution of the supplied prompt; loop continues until model exits or user stops
    schedule: dynamic (per-tick scheduled via ScheduleWakeup) OR fixed-interval (cron-style)
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/loop/ (runtime-registered via plugin)

  # ============================================================
  # Phase 3b — bulk authoring (2026-05-16)
  # Remaining 4 subagents + 12 harness-listed skills + 3 local-only skills.
  # Drafted from system-prompt subagent descriptions + skill .sh script
  # headers + harness's available-skills runtime registry.
  # ============================================================

  - id: subagent_general_purpose
    kind: subagent
    role_label: general-purpose — Multi-Step Researcher + Executor
    invocation_pattern: Agent tool with subagent_type=general-purpose
    description: |
      General-purpose agent for researching complex questions, searching for
      code, and executing multi-step tasks. Use when searching for a keyword
      or file and not confident the first few tries will hit, or for any
      open-ended workflow that doesn't match a more specialized subagent.
    scope_excluded: |
      Not for read-only quick lookups (Explore is faster + lighter). Not for
      pure plan authorship (use Plan). Not for trivial single-step tasks
      better handled inline. Has full tool access — use the narrower subagent
      kinds when their scope matches to keep context tight.
    reports_to: operator
    inputs: A task description + optional context; can be open-ended
    outputs: A concise report of work performed + findings; may include file edits if the task warranted them
    tools_allow_list:
      - "*"
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  - id: subagent_claude_code_guide
    kind: subagent
    role_label: claude-code-guide — Claude Code/SDK/API Q&A
    invocation_pattern: Agent tool with subagent_type=claude-code-guide
    description: |
      Use when the user asks "Can Claude...", "Does Claude...", "How do I..."
      questions about Claude Code (CLI), Claude Agent SDK (building custom
      agents), or Claude API (Anthropic SDK usage, tool use, model versions).
      Check for already-running instances and continue via SendMessage before
      spawning a new one.
    scope_excluded: |
      Not for general programming questions (use general-purpose). Not for
      code search (use Explore). Not for active implementation work (use Plan
      or general-purpose). Strictly Q&A about Anthropic products.
    reports_to: operator
    inputs: A natural-language question about Claude Code / SDK / API
    outputs: Concise answer with documentation citations
    tools_allow_list:
      - Bash
      - Read
      - WebFetch
      - WebSearch
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  - id: subagent_claude
    kind: subagent
    role_label: claude — Catch-All (FleetView Default)
    invocation_pattern: Agent tool with subagent_type=claude (or FleetView default when no agent name typed)
    description: |
      Catch-all subagent for any task that doesn't fit a more specific agent.
      FleetView's default when no agent name is typed. Has full tool access.
    scope_excluded: |
      Prefer a more specific subagent when one fits — claude is the fallback,
      not the first choice. Using a specialized subagent (Explore for search,
      Plan for design, claude-code-guide for SDK Q&A) keeps context tighter
      and produces sharper outputs.
    reports_to: operator
    inputs: Any task description that doesn't match a more specific subagent
    outputs: Varies by task; same shape as the operator-level agent
    tools_allow_list:
      - "*"
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  - id: subagent_statusline_setup
    kind: subagent
    role_label: statusline-setup — Status Line Configurator
    invocation_pattern: Agent tool with subagent_type=statusline-setup
    description: |
      Configure the Claude Code status line setting. Narrow-purpose agent
      with minimal tool access (Read + Edit only).
    scope_excluded: |
      Not for general settings.json work (use /update-config). Not for any
      other configuration task — status line only.
    reports_to: operator
    inputs: A status line configuration request (theme, layout, etc.)
    outputs: Updated settings.json with status line block modified
    tools_allow_list:
      - Read
      - Edit
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/CLAUDE.md (runtime-registered)

  - id: skill_pre_brief
    kind: skill
    role_label: /pre-brief — Incoming Nephew Readiness Check
    invocation_pattern: /pre-brief in chat
    description: |
      Pre-fire readiness check for the INCOMING nephew — predecessor activity +
      handoff status + clear-to-fire verdict. Run before a nephew wakes to verify
      the cascade is in a clean state for the next fire.
    scope_excluded: |
      Not for general session briefing (use /brief). Not for batch readiness
      across multiple nephews (use /batch-brief). Not for active sprint work —
      this is a pre-condition check, not work itself.
    reports_to: operator
    inputs: Optional --sprint-id; defaults to detection from cwd
    outputs: Clear-to-fire | needs-attention verdict + predecessor activity summary + handoff status
    dependencies:
      - service_casey_junior
      - service_ellabot
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/pre-brief/pre-brief.sh

  - id: skill_batch_brief
    kind: skill
    role_label: /batch-brief — Incoming-Batch Readiness for Receiving Nephew
    invocation_pattern: /batch-brief in chat
    description: |
      Single-screen incoming-batch readiness for receiving nephew — handoff scan +
      pool/forward-scope + acceptance gates + charter cites + verdict. Used when
      multiple work items are queued for one nephew and they need to be evaluated
      as a batch before fire.
    scope_excluded: |
      Not for single-item readiness (use /pre-brief). Not for session-level state
      (use /brief). Not for actually doing the work — pure pre-fire evaluation.
    reports_to: operator
    inputs: Optional --receiving-nephew (huey | louie | dewey); defaults from cwd
    outputs: Batch readiness verdict + per-item gate status + charter cites + handoff scan
    dependencies:
      - service_casey_junior
      - service_ellabot
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/batch-brief/batch-brief.sh

  - id: skill_intent
    kind: skill
    role_label: /intent — EllaBot Layer-C Operator-Intent Tag
    invocation_pattern: /intent "<one-line summary>" (with optional --code / --duration / --dry-run)
    description: |
      Fires an EllaBot Layer-C operator-intent entry — the "right thing to do
      here is X" piecemeal intent / aside / planning thought that doesn't fit
      a loop close or memory authoring. Auto-augments with cycle context from
      cwd .foreman/cycle.json.
    scope_excluded: |
      Not for sprint-loop closes (those fire via loop-close discipline). Not
      for memory authoring (that fires its own EllaBot entry via the memory
      framework). Strictly the piecemeal-intent lane (Layer C of the Personal-
      pillar synthesis triad).
    reports_to: operator
    inputs: A one-line summary string + optional activity_code override + optional duration
    outputs: EllaBot entry fired (or printed in --dry-run mode); metadata.synthesis_event_type=operator_intent
    dependencies:
      - service_ellabot
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/intent/intent.sh

  - id: skill_recall
    kind: skill
    role_label: /recall — Query darntech-rag for Framework Substrate
    invocation_pattern: /recall <query> (with --k / --corpus / --no-context / --raw flags)
    description: |
      Queries the darntech-rag service (192.168.0.151:8000 by default) for
      relevant chunks from the framework substrate — memory files, sprint
      logs, charter docs, commit bodies. Auto-detects cycle context from cwd
      .foreman/cycle.json and caller_role from git branch.
    scope_excluded: |
      Not for governance-rag queries (use rag-core-client's recall_governance
      from code, not /recall). Not for keyword-only search (use Grep or
      ripgrep). The framework substrate is what's indexed — content outside
      that (live code, current state) is better served by direct tools.
    reports_to: operator
    inputs: A natural-language query + optional k (max 50) + optional corpus filters
    outputs: Pretty-markdown formatted chunks (or raw JSON if --raw) with score + source_uri per hit
    dependencies:
      - service_darntech_rag
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/recall/recall.sh

  - id: skill_tock
    kind: skill
    role_label: /tock — End-of-Tick Handoff Suggester + Close-Side Mutation
    invocation_pattern: /tock (read-only) | /tock --auto-close (close-event mutation, fired by post-commit hook)
    description: |
      Cascade-nephew tick management. Read-only mode (default) briefs lane
      summary + pool view + recommended next direction + handoff doc skeleton.
      Mutation mode (--auto-close) is fired by post-commit hook on close-shaped
      commits — writes close-event to pool-events.jsonl, recomputes pool-state,
      posts OPS.ORCH_TICK.CLOSE to EllaBot. Idempotent.
    scope_excluded: |
      Not for cross-cascade audit (use cross-sprint-audit.sh). Not for non-
      nephew worktrees (cascade-specific tooling). Not for ad-hoc handoff
      authoring — the recommended direction is a heuristic, not a decision.
    reports_to: operator
    inputs: None (read-only) | --sprint --loop --commit (auto-close mode)
    outputs: Read-only briefing OR close-event written + EllaBot fire OR no-op (idempotent)
    dependencies:
      - service_ellabot
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/tock/tock.sh

  - id: skill_schedule
    kind: skill
    role_label: /schedule — Manage Scheduled Remote Routines
    invocation_pattern: /schedule <subcommand> (create | update | list | run | delete)
    description: |
      Create, update, list, or run scheduled remote agents (routines) that
      execute on a cron schedule. Use for recurring REMOTE work or one-time
      scheduled runs ("run this once at 3pm", "remind me to check X tomorrow").
    scope_excluded: |
      Not for LOCAL recurring loops (use /loop instead). Not for systemd timers
      (those are managed via systemctl --user). Routines run on a remote
      cron-style infrastructure, not in this Claude Code session.
    reports_to: operator
    inputs: A subcommand + parameters (cron expression, prompt template, etc.)
    outputs: Routine created/updated/listed/run/deleted; confirmation in chat
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/schedule/ (harness-managed, runtime-registered)

  - id: skill_update_config
    kind: skill
    role_label: /update-config — Configure Claude Code Harness (settings.json)
    invocation_pattern: /update-config in chat
    description: |
      Configure the Claude Code harness via settings.json. Required for any
      AUTOMATED behavior — hooks, permission rules, env vars. "From now on
      when X" / "each time X" / "whenever X" / "before/after X" behaviors must
      be implemented as harness hooks; cannot be addressed via memory or
      preferences alone.
    scope_excluded: |
      Not for memory work (that's separate). Not for skill authoring (skills
      live in ~/.claude/skills/). Not for keybindings (use /keybindings-help).
      Simple model/theme settings should suggest the /config command instead.
    reports_to: operator
    inputs: A description of the desired automated behavior or setting change
    outputs: Updated settings.json + brief explanation of what fires when
    tools_allow_list:
      - Read
      - Edit
      - Write
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/update-config/ (harness-managed)

  - id: skill_keybindings_help
    kind: skill
    role_label: /keybindings-help — Customize Keyboard Shortcuts
    invocation_pattern: /keybindings-help in chat
    description: |
      Customize keyboard shortcuts, rebind keys, add chord bindings, or modify
      ~/.claude/keybindings.json. Use for any keymap change in Claude Code.
    scope_excluded: |
      Not for general settings (use /update-config). Not for skill or agent
      configuration. Strictly keybindings.
    reports_to: operator
    inputs: A keybinding change request (rebind X, add chord Y, etc.)
    outputs: Updated ~/.claude/keybindings.json + confirmation of new binding
    tools_allow_list:
