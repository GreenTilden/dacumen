      Not the internal infrastructure layer (that's Internal Systems Director).
      Not the vertical-IP system (Workshop Foreman). Not cross-BU strategic
      ratification (Strategic Head). Not financial bookkeeping (Lorna service).
      Front Office is the perimeter — outward-facing presentation + charter
