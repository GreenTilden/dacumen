      ratification_cycle: gov-10
      source_path: ~/.claude/skills/keybindings-help/ (harness-managed)

  - id: skill_simplify
    kind: skill
    role_label: /simplify — Review Changed Code for Reuse + Quality
    invocation_pattern: /simplify in chat
    description: |
      Review changed code for reuse, quality, and efficiency, then fix any
      issues found. Catches unnecessary abstractions, missed reuse
      opportunities, and verbose patterns that have shorter equivalents.
    scope_excluded: |
      Not for code review of someone else's PR (use /review). Not for security
      issues (use /security-review). Not for new feature work — strictly a
      quality + simplification pass on already-changed code.
    reports_to: operator
    inputs: None (reviews currently-changed files in working tree)
    outputs: List of identified issues + applied fixes; before/after diffs
    tools_allow_list:
      - Read
      - Edit
      - Bash
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/simplify/ (harness-managed)

  - id: skill_fewer_permission_prompts
    kind: skill
    role_label: /fewer-permission-prompts — Build Bash/MCP Allowlist
    invocation_pattern: /fewer-permission-prompts in chat
    description: |
      Scans your transcripts for common read-only Bash and MCP tool calls,
      then adds a prioritized allowlist to project .claude/settings.json to
      reduce permission prompts.
    scope_excluded: |
      Not for granting write access to anything (allowlist is read-only by
      design). Not for adding hooks (use /update-config). The allowlist is
      scoped to the current project unless explicitly moved to user settings.
    reports_to: operator
    inputs: None (analyzes existing transcripts in cwd)
    outputs: Updated .claude/settings.json with allowlist additions + summary of what's now auto-approved
    tools_allow_list:
      - Read
      - Edit
      - Write
      - Bash
    provenance:
      authored_at: 2026-05-16
      ratification_cycle: gov-10
      source_path: ~/.claude/skills/fewer-permission-prompts/ (harness-managed)

